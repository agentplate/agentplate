version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      root-dependencies:
        patterns:
          - "*"
        # Batch only minor/patch; majors get their own reviewable PRs.
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "bun"
    directory: "/ui"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      ui-dependencies:
        patterns:
          - "*"
        # Batch only minor/patch; majors get their own reviewable PRs.
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      github-actions:
        patterns:
          - "*"
        # Batch only minor/patch; majors get their own reviewable PRs.
        update-types:
          - "minor"
          - "patch"
