name: Publish

# Publishes @agentplate/cli to npm on every push to main, then creates the
# matching GitHub Release. Guarded so it only runs `npm publish` when
# package.json's version is not already on the registry (npm forbids
# republishing an existing version), and skips cleanly when NPM_TOKEN is not yet
# configured. The release step is idempotent — it skips if the release already
# exists — so a manually-created release/tag never conflicts.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release (+ its tag)
      id-token: write # required for npm provenance (OIDC)
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Quality gates
        run: |
          bun test
          bun run lint
          bun run typecheck

      - name: Setup Node (npm publish + provenance)
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Determine if version needs publishing
        id: ver
        run: |
          NAME=$(node -p "require('./package.json').name")
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view "$NAME" version 2>/dev/null || echo "none")
          echo "name=$NAME"   >> "$GITHUB_OUTPUT"
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$LOCAL is already published — nothing to publish."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Will publish $NAME@$LOCAL (registry currently at: $REMOTE)."
          fi

      - name: Publish to npm
        if: steps.ver.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::warning::NPM_TOKEN secret is not set — skipping publish of ${{ steps.ver.outputs.name }}@${{ steps.ver.outputs.local }}."
            exit 0
          fi
          npm publish --provenance --access public

      - name: Create GitHub Release
        if: steps.ver.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.local }}
        run: |
          tag="v${VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "::notice::Release $tag already exists — skipping."
            exit 0
          fi
          # Use this version's CHANGELOG section as the notes; fall back to
          # auto-generated notes if the section is missing.
          awk -v v="$VERSION" 'BEGIN{p="^## \\[" v "\\]"} $0 ~ p {f=1;next} /^## \[/{if(f)exit} f' \
            CHANGELOG.md > /tmp/release-notes.md
          if [ -s /tmp/release-notes.md ]; then
            gh release create "$tag" --title "$tag" --target "$GITHUB_SHA" --notes-file /tmp/release-notes.md
          else
            gh release create "$tag" --title "$tag" --target "$GITHUB_SHA" --generate-notes
          fi
          echo "::notice::Created GitHub Release $tag."
